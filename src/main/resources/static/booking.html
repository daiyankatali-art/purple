<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="navbar">
        <h2>Booking</h2>
        <div>
            <a href="home.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="booking.html">Booking</a>
            <a href="services.html">Services</a>
            <a href="parcels.html">Parcels</a>
        </div>
    </div>
</header>
<div class="booking-layout"></div>
<div class="form-container">
    <h2>Book a Trip</h2>

    <form id="bookingForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Enter Your Full name(eg Kofi Mensah)" required>
        <label for="from">From:</label>
        <select id="from" name="from" required>
        <option disabled selected>Select a City</option>
        <option >Accra</option>
        <option >Cape Coast</option>
        <option >Tamale</option>
        <option >Bolgatanga</option>
        <option >Kumasi</option>
        <option >takoradi</option>


        </select>
        <label for="to">To:</label>
        <select id="to" name="to" required>
        <option disabled selected>Select a City</option>
        <option >Accra</option>
        <option >Cape Coast</option>
        <option >Kumasi</option>
        <option >Tamale</option>
        <option >Bolgatanga</option>
        <option >takoradi</option>


        </select>
        <label for="phonenumber">Phone Number:</label>
        <input type="text" id="phonenumber" placeholder="Phone Number" pattern="[0-9]{10}" maxlength="10" required>
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>
        <label for="tickets">Number of Tickets:</label>
        <input type="number" id="tickets" placeholder="Number of Tickets" min="1" required>

        <!-- <button type="submit">Submit Booking</button>
        
    </form>
   
</div> -->
        <button type="submit">Submit Booking</button>
    </form>
</div>

<div class="availability-panel">
    <h3>Seat Availability</h3>
    <p id="availabilityText">Select route and date to check seats.</p>
    <div class="availability-bar">
        <div class="availability-fill" id="availabilityFill"></div>
    </div>
</div>
</div>



<footer>
    <p>&copy; 2026 Purple Travel System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
